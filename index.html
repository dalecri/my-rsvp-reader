<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flick - RSVP Speed Reader</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {}
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- JSZip & ePub.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

  <style>
    body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    
    /* Hide input range track standard styling to rely on our custom design */
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: currentColor;
      margin-top: -6px;
    }
    input[type=range]::-webkit-slider-runnable-track {
      -webkit-appearance: none;
      box-shadow: none;
      border: none;
      background: transparent;
    }
  </style>
</head>
<body class="bg-[#faf9f6] text-[#1c1917] dark:bg-[#121212] dark:text-[#e5e5e5] transition-colors">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Inline Icons (Replacing lucide-react) ---
    const IconProps = { fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" };
    const Play = ({ size = 24, className = "", fill="none" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} className={className} {...IconProps}><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>;
    const Pause = ({ size = 24, className = "", fill="none" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} className={className} {...IconProps}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
    const Plus = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" className={className} {...IconProps}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const ChevronLeft = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" className={className} {...IconProps}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const BookOpen = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" className={className} {...IconProps}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
    const Trash2 = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" className={className} {...IconProps}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const List = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" className={className} {...IconProps}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
    const X = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" className={className} {...IconProps}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const Moon = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" className={className} {...IconProps}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
    const Sun = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" className={className} {...IconProps}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;
    const SkipBack = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" className={className} {...IconProps}><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>;
    const SkipForward = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" className={className} {...IconProps}><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>;

    // --- IndexedDB Helper for Persistent Storage ---
    const DB_NAME = 'RSVPLibraryDB';
    const STORE_NAME = 'books';

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 2);
        request.onerror = () => reject('Database failed to open');
        request.onsuccess = (e) => resolve(e.target.result);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
      });
    };

    const saveBookToDB = async (bookData) => {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put(bookData);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    };

    const getBooksFromDB = async () => {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    };

    const deleteBookFromDB = async (id) => {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    };

    // --- Subcomponents ---
    const RSVPWord = ({ word }) => {
      if (!word) return null;

      const getORP = (w) => {
        const len = w.length;
        if (len <= 1) return 0;
        if (len <= 3) return 1;
        if (len <= 5) return 2;
        if (len <= 7) return 3;
        if (len <= 9) return 4;
        if (len <= 13) return 5;
        return 6;
      };

      const orp = getORP(word);
      const left = word.substring(0, orp);
      const mid = word.substring(orp, orp + 1);
      const right = word.substring(orp + 1);

      return (
        <div className="flex font-mono text-[4rem] sm:text-[6rem] md:text-[8rem] tracking-tight items-center text-[#1c1917] dark:text-[#f4f4f5] select-none w-full max-w-5xl mx-auto">
          <div className="flex-1 text-right whitespace-pre">{left}</div>
          <div className="text-[#c84b31] dark:text-[#e45b3e] relative font-semibold flex justify-center w-[1.2ch]">
            <div className="absolute -top-6 md:-top-10 w-2 h-2 md:w-3 md:h-3 bg-[#c84b31] dark:bg-[#e45b3e] rounded-full shadow-sm"></div>
            {mid}
          </div>
          <div className="flex-1 text-left whitespace-pre">{right}</div>
        </div>
      );
    };

    function App() {
      const [books, setBooks] = useState([]);
      const [activeBook, setActiveBook] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [wpm, setWpm] = useState(500); 
      const [wordIndex, setWordIndex] = useState(0);
      const [isParsing, setIsParsing] = useState(false);
      const [showChapters, setShowChapters] = useState(false);
      const [isDark, setIsDark] = useState(() => {
        return localStorage.getItem('theme') === 'dark';
      });
      
      const fileInputRef = useRef(null);

      // Theme Persistence
      useEffect(() => {
        if (isDark) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [isDark]);

      // Load books on mount
      useEffect(() => {
        getBooksFromDB().then(setBooks).catch(console.error);
      }, []);

      // Keyboard Shortcuts
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (!activeBook) return;
          if (document.activeElement.tagName === 'INPUT') return;

          switch(e.code) {
            case 'Space': 
              e.preventDefault(); 
              setIsPlaying(p => !p); 
              break;
            case 'ArrowRight': 
              e.preventDefault(); 
              setIsPlaying(false); 
              setWordIndex(i => Math.min(i + 1, activeBook.words.length - 1)); 
              break;
            case 'ArrowLeft': 
              e.preventDefault(); 
              setIsPlaying(false); 
              setWordIndex(i => Math.max(i - 1, 0)); 
              break;
            case 'ArrowUp': 
              e.preventDefault(); 
              setWpm(w => Math.min(w + 50, 1000)); 
              break;
            case 'ArrowDown': 
              e.preventDefault(); 
              setWpm(w => Math.max(w - 50, 100)); 
              break;
            case 'BracketLeft':
            case 'BracketRight':
              e.preventDefault();
              setShowChapters(s => !s);
              break;
            default:
              break;
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [activeBook]);

      // RSVP Timer Logic
      useEffect(() => {
        let interval;
        if (isPlaying && activeBook && wordIndex < activeBook.words.length - 1) {
          const msPerWord = 60000 / wpm;
          interval = setInterval(() => {
            setWordIndex((prev) => {
              if (prev >= activeBook.words.length - 2) {
                setIsPlaying(false);
                return activeBook.words.length - 1;
              }
              return prev + 1;
            });
          }, msPerWord);
        }
        return () => clearInterval(interval);
      }, [isPlaying, wpm, activeBook, wordIndex]);

      // Handle epub import and text extraction
      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setIsParsing(true);
        const reader = new FileReader();

        reader.onload = async (event) => {
          try {
            const bookData = event.target.result;
            const book = window.ePub(bookData);
            await book.ready;

            const metadata = await book.loaded.metadata;
            const title = metadata.title || file.name.replace('.epub', '');
            const author = metadata.creator || "Unknown Author";
            
            let coverUrl = null;
            try { coverUrl = await book.coverUrl(); } catch (err) {}

            let extractedWords = [];
            let extractedChapters = [];
            let globalWordCount = 0;
            const spine = book.spine;
            const nav = await book.loaded.navigation;
            const tocList = nav ? nav.toc : [];
            
            for (let i = 0; i < spine.length; i++) {
              const item = spine.get(i);
              try {
                const doc = await item.load(book.load.bind(book));
                if (doc) {
                  let textContent = "";
                  if (typeof doc === 'string') {
                    const parser = new DOMParser();
                    const parsed = parser.parseFromString(doc, "text/html");
                    textContent = parsed.body ? parsed.body.textContent : parsed.textContent || "";
                  } else {
                    textContent = (doc.body ? doc.body.textContent : doc.textContent) || "";
                  }
                  
                  const cleanWords = textContent.trim().split(/\s+/).filter(Boolean);
                  
                  if (cleanWords.length > 0) {
                    let chapterTitle = `Section ${i + 1}`;
                    const matchedToc = tocList.find(t => t.href.includes(item.idref) || item.href.includes(t.href.split('#')[0]));
                    if (matchedToc) chapterTitle = matchedToc.label.trim();

                    extractedChapters.push({
                      title: chapterTitle,
                      index: globalWordCount
                    });
                    
                    globalWordCount += cleanWords.length;
                    extractedWords = extractedWords.concat(cleanWords);
                  }
                }
              } catch (itemErr) {
                console.warn(`Skipping unreadable spine item ${i}:`, itemErr);
              }
            }

            const newBook = {
              id: Date.now().toString(),
              title,
              author,
              coverUrl,
              words: extractedWords,
              chapters: extractedChapters,
              progress: 0
            };

            await saveBookToDB(newBook);
            setBooks((prev) => [...prev, newBook]);
          } catch (error) {
            console.error("Error parsing epub:", error);
            alert("Failed to parse the EPUB file.");
          } finally {
            setIsParsing(false);
            if (fileInputRef.current) fileInputRef.current.value = '';
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const openBook = (book) => {
        setActiveBook(book);
        setWordIndex(book.progress || 0);
        setIsPlaying(false);
        setShowChapters(false);
      };

      const closeBook = async () => {
        if (activeBook) {
          const updatedBook = { ...activeBook, progress: wordIndex };
          await saveBookToDB(updatedBook);
          setBooks((prev) => prev.map(b => b.id === updatedBook.id ? updatedBook : b));
        }
        setActiveBook(null);
        setIsPlaying(false);
      };

      const handleDelete = async (e, id) => {
        e.stopPropagation();
        await deleteBookFromDB(id);
        setBooks(books.filter(b => b.id !== id));
      };

      const stepWord = (direction) => {
        setIsPlaying(false);
        if (direction === 'forward') setWordIndex(i => Math.min(i + 1, activeBook.words.length - 1));
        else setWordIndex(i => Math.max(i - 1, 0));
      };

      const handleSeek = (e) => {
        const val = parseInt(e.target.value, 10);
        setWordIndex(val);
        setIsPlaying(false);
      };

      // --- Render Views ---
      return (
        <div className="w-full min-h-screen">
          {activeBook ? (
            // Reader View
            <div className="fixed inset-0 bg-[#faf9f6] dark:bg-[#121212] text-[#1c1917] dark:text-[#e5e5e5] font-sans flex flex-col overflow-hidden transition-colors">
              
              {/* Top Nav */}
              <header className="p-6 md:p-8 flex justify-between items-center z-10">
                <button 
                  onClick={closeBook}
                  className="flex items-center gap-2 px-5 py-2.5 bg-white dark:bg-[#1e1e1e] rounded-full border border-slate-200/60 dark:border-slate-800 shadow-sm hover:shadow dark:shadow-none dark:hover:bg-[#2a2a2a] transition-all text-sm font-medium"
                >
                  <ChevronLeft size={18} /> Library
                </button>
                
                <div className="hidden md:block text-slate-400 dark:text-slate-500 font-serif italic text-lg tracking-wide truncate max-w-lg">
                  {activeBook.title}
                </div>
                
                <button 
                  onClick={() => setShowChapters(true)}
                  className="flex items-center gap-3 px-5 py-2.5 bg-white dark:bg-[#1e1e1e] rounded-full border border-slate-200/60 dark:border-slate-800 shadow-sm hover:shadow dark:shadow-none dark:hover:bg-[#2a2a2a] transition-all text-sm font-medium"
                >
                  <List size={16} /> 
                  <span className="hidden sm:inline truncate max-w-[150px]">{activeBook.chapters?.[activeBook.chapters.findLastIndex(c => c.index <= wordIndex) !== -1 ? activeBook.chapters.findLastIndex(c => c.index <= wordIndex) : 0]?.title || 'Start'}</span> 
                  <span className="text-slate-400 dark:text-slate-600">|</span> 
                  <span className="text-slate-500 dark:text-slate-400">{(activeBook.chapters?.findLastIndex(c => c.index <= wordIndex) !== -1 ? activeBook.chapters.findLastIndex(c => c.index <= wordIndex) : 0) + 1}/{activeBook.chapters?.length || 1}</span>
                </button>
              </header>

              {/* Reader Center */}
              <main 
                className="flex-1 flex flex-col items-center justify-center relative cursor-pointer" 
                onClick={() => setIsPlaying(!isPlaying)}
              >
                <RSVPWord word={activeBook.words[wordIndex] || "End."} />
              </main>

              {/* Bottom Floating Control Pill */}
              <div className="absolute bottom-6 md:bottom-10 left-1/2 -translate-x-1/2 w-[95%] max-w-3xl flex flex-col items-center gap-3 z-40">
                
                {/* Shortcuts Legend */}
                <div className="hidden md:flex gap-3 text-[10px] uppercase font-mono tracking-widest text-slate-400 dark:text-slate-500 font-semibold mb-1">
                  <span className="bg-white/50 dark:bg-[#1e1e1e]/50 px-2 py-1 rounded">Space <span className="text-slate-400/50 dark:text-slate-600">Play/Pause</span></span>
                  <span className="bg-white/50 dark:bg-[#1e1e1e]/50 px-2 py-1 rounded">← → <span className="text-slate-400/50 dark:text-slate-600">Step</span></span>
                  <span className="bg-white/50 dark:bg-[#1e1e1e]/50 px-2 py-1 rounded">↑ ↓ <span className="text-slate-400/50 dark:text-slate-600">WPM</span></span>
                  <span className="bg-white/50 dark:bg-[#1e1e1e]/50 px-2 py-1 rounded">[ ] <span className="text-slate-400/50 dark:text-slate-600">Chapters</span></span>
                </div>

                <div className="w-full bg-white/80 dark:bg-[#1e1e1e]/90 backdrop-blur-xl border border-slate-200/50 dark:border-slate-800 shadow-2xl rounded-3xl md:rounded-full p-4 md:p-4 flex flex-col md:flex-row items-stretch md:items-center justify-between gap-4 md:gap-8" onClick={e => e.stopPropagation()}>
                  
                  {/* Top Row on Mobile: Playback & WPM */}
                  <div className="flex items-center justify-between w-full md:w-auto gap-4">
                    {/* Playback Controls */}
                    <div className="flex items-center gap-1 md:gap-3">
                      <button onClick={() => stepWord('backward')} className="p-2 hover:bg-slate-100 dark:hover:bg-[#2a2a2a] rounded-full transition-colors text-slate-600 dark:text-slate-400">
                        <SkipBack size={20} />
                      </button>
                      <button
                        onClick={() => setIsPlaying(!isPlaying)}
                        className="w-12 h-12 flex items-center justify-center bg-[#1c1917] dark:bg-white text-white dark:text-[#1c1917] rounded-full shadow-md hover:scale-105 active:scale-95 transition-all"
                      >
                        {isPlaying ? <Pause size={20} fill="currentColor" /> : <Play size={20} fill="currentColor" className="ml-0.5" />}
                      </button>
                      <button onClick={() => stepWord('forward')} className="p-2 hover:bg-slate-100 dark:hover:bg-[#2a2a2a] rounded-full transition-colors text-slate-600 dark:text-slate-400">
                        <SkipForward size={20} />
                      </button>
                    </div>

                    {/* Right Divider & WPM */}
                    <div className="flex items-center gap-4 md:gap-6 pr-2 md:pr-4 md:border-l border-slate-200 dark:border-slate-700 md:pl-6">
                       <input 
                          type="range" 
                          min="100" 
                          max="1000" 
                          step="50"
                          value={wpm}
                          onChange={(e) => setWpm(Number(e.target.value))}
                          className="w-20 md:w-24 accent-[#c84b31] dark:accent-[#e45b3e] h-1 bg-slate-200 dark:bg-slate-700 rounded-lg cursor-pointer"
                        />
                        <div className="flex flex-col items-end w-8 md:w-10 text-[#1c1917] dark:text-[#e5e5e5]">
                          <span className="text-sm font-bold leading-none">{wpm}</span>
                          <span className="text-[9px] font-bold text-slate-400 dark:text-slate-500 mt-1 uppercase">WPM</span>
                        </div>
                    </div>
                  </div>

                  {/* Scrubber & Progress (Bottom row on mobile) */}
                  <div className="flex-1 flex items-center gap-3 md:gap-4 md:border-none border-t border-slate-200/50 dark:border-slate-700/50 pt-3 md:pt-0">
                    <span className="text-xs font-bold text-slate-400 dark:text-slate-500 w-8">{((wordIndex / (Math.max(activeBook.words.length - 1, 1))) * 100).toFixed(0)}%</span>
                    
                    <div className="flex-1 relative flex items-center h-8">
                      <input 
                        type="range" 
                        min="0" 
                        max={Math.max(activeBook.words.length - 1, 1)} 
                        value={wordIndex}
                        onChange={handleSeek}
                        className="w-full absolute inset-0 opacity-0 cursor-pointer z-10"
                      />
                      {/* Custom Track */}
                      <div className="w-full h-1 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                        <div 
                          className="h-full bg-slate-400 dark:bg-slate-500 transition-all duration-150 ease-linear"
                          style={{ width: `${((wordIndex / (Math.max(activeBook.words.length - 1, 1))) * 100)}%` }}
                        />
                      </div>
                      {/* Custom Thumb */}
                      <div 
                        className="absolute h-3 w-3 bg-[#1c1917] dark:bg-white rounded-full pointer-events-none transition-all duration-150 ease-linear -ml-1.5"
                        style={{ left: `${((wordIndex / (Math.max(activeBook.words.length - 1, 1))) * 100)}%` }}
                      />
                    </div>

                    <span className="text-[10px] font-mono font-medium text-slate-400 dark:text-slate-500 w-16 md:w-24 text-right uppercase tracking-wider">
                      ~{Math.ceil((activeBook.words.length - wordIndex) / wpm)} M LEFT
                    </span>
                  </div>
                </div>
              </div>

              {/* Chapters Drawer */}
              {showChapters && (
                <div className="absolute inset-0 z-50 flex">
                   <div className="flex-1 bg-black/5 dark:bg-black/40" onClick={() => setShowChapters(false)} />
                   <div className="w-80 bg-white dark:bg-[#18181b] h-full shadow-[-20px_0_40px_rgba(0,0,0,0.05)] dark:shadow-[-20px_0_40px_rgba(0,0,0,0.5)] flex flex-col animate-in slide-in-from-right duration-300 border-l border-slate-100 dark:border-slate-800">
                      <div className="p-6 flex justify-between items-center border-b border-slate-100 dark:border-slate-800">
                        <h3 className="font-serif italic text-xl text-slate-800 dark:text-slate-200">Table of Contents</h3>
                        <button onClick={() => setShowChapters(false)} className="p-2 hover:bg-slate-50 dark:hover:bg-[#2a2a2a] rounded-full transition-colors text-slate-400 dark:text-slate-500"><X size={20}/></button>
                      </div>
                      <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-1 custom-scrollbar">
                        {activeBook.chapters?.map((chap, idx) => {
                          const currentChapterIndex = activeBook.chapters.findLastIndex(c => c.index <= wordIndex);
                          return (
                            <button 
                              key={idx} 
                              onClick={() => { setWordIndex(chap.index); setShowChapters(false); setIsPlaying(false); }}
                              className={`text-left px-4 py-3 rounded-xl text-sm transition-colors ${
                                idx === (currentChapterIndex !== -1 ? currentChapterIndex : 0)
                                  ? 'bg-orange-50 dark:bg-[#e45b3e]/10 text-[#c84b31] dark:text-[#e45b3e] font-medium' 
                                  : 'hover:bg-slate-50 dark:hover:bg-[#2a2a2a] text-slate-600 dark:text-slate-400'
                              }`}
                            >
                              {chap.title}
                            </button>
                          );
                        })}
                      </div>
                   </div>
                </div>
              )}
            </div>
          ) : (
            // Library View
            <div className="min-h-screen font-sans selection:bg-orange-100 dark:selection:bg-orange-900/30">
              
              {/* Navbar */}
              <nav className="flex justify-between items-center p-6 md:p-10">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-[#1c1917] dark:bg-white rounded flex items-center justify-center text-white dark:text-[#1c1917] font-serif font-bold text-lg">F</div>
                  <span className="font-bold tracking-tight text-lg">Flick</span>
                </div>
                <div className="text-xs font-medium text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-800 rounded-full pl-4 pr-2 py-1.5 flex items-center gap-3 bg-white/50 dark:bg-[#1e1e1e]/50 backdrop-blur-sm">
                    <span>{books.length} book{books.length !== 1 && 's'} <span className="text-slate-300 dark:text-slate-600 mx-1">•</span> {books.reduce((acc, b) => acc + (b.words?.length || 0), 0).toLocaleString()} words</span>
                    <button 
                      onClick={() => setIsDark(!isDark)}
                      className="w-7 h-7 bg-white dark:bg-[#2a2a2a] border border-slate-200 dark:border-slate-700 rounded-full flex items-center justify-center hover:bg-slate-50 dark:hover:bg-[#333] transition-colors shadow-sm"
                      aria-label="Toggle dark mode"
                    >
                      {isDark ? <Sun size={12} className="text-slate-300 hover:text-white" /> : <Moon size={12} className="text-slate-600 hover:text-black" />}
                    </button>
                </div>
              </nav>

              {/* Hero Section */}
              <div className="px-6 md:px-10 mt-12 mb-20 max-w-3xl">
                <div className="text-[11px] uppercase tracking-[0.25em] text-[#c84b31] dark:text-[#e45b3e] font-bold mb-6 flex items-center gap-3">
                  Your Shelf <span className="w-12 h-px bg-orange-200 dark:bg-orange-900"></span>
                </div>
                <h1 className="text-5xl md:text-7xl lg:text-[5.5rem] font-serif text-[#1c1917] dark:text-[#f4f4f5] leading-[1.1] tracking-tight mb-6">
                  Read <span className="italic text-[#c84b31] dark:text-[#e45b3e]">faster</span>,<br/>one word at a time.
                </h1>
                <p className="text-slate-500 dark:text-slate-400 text-base md:text-lg leading-relaxed max-w-lg font-medium">
                  Drop an EPUB anywhere on this page to import it. Pick a book to start a focused RSVP session — your eyes stay still, the words come to you.
                </p>
              </div>

              {/* Grid Layout */}
              <div className="px-6 md:px-10 pb-32 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-6 gap-y-12">
                {books.map((book) => (
                  <div 
                    key={book.id}
                    onClick={() => openBook(book)}
                    className="group relative flex flex-col gap-4 cursor-pointer"
                  >
                    <div className="aspect-[2/3] w-full bg-white dark:bg-[#1e1e1e] rounded-2xl shadow-sm border border-slate-200/60 dark:border-slate-800 overflow-hidden flex items-center justify-center hover:shadow-2xl dark:hover:shadow-[0_20px_40px_rgba(0,0,0,0.5)] hover:-translate-y-2 transition-all duration-300 relative">
                      {book.coverUrl ? (
                        <img src={book.coverUrl} alt={book.title} className="w-full h-full object-cover" />
                      ) : (
                        <div className="w-full h-full bg-slate-50 dark:bg-[#222] flex flex-col items-center justify-center p-4 text-center">
                           <BookOpen size={32} className="text-slate-300 dark:text-slate-600 mb-3" />
                           <span className="text-xs font-serif italic text-slate-400 dark:text-slate-500 line-clamp-3">{book.title}</span>
                        </div>
                      )}
                      
                      <button 
                        onClick={(e) => handleDelete(e, book.id)}
                        className="absolute top-3 right-3 p-2 bg-white/90 dark:bg-black/70 backdrop-blur-md text-red-500 rounded-full opacity-0 group-hover:opacity-100 hover:bg-red-50 dark:hover:bg-red-950/50 transition-all shadow-sm z-10"
                      >
                        <Trash2 size={16} />
                      </button>
                    </div>
                    
                    <div className="px-1">
                      <h3 className="font-serif font-bold text-[#1c1917] dark:text-[#e5e5e5] line-clamp-2 leading-snug">{book.title}</h3>
                      {book.author && <p className="text-xs text-slate-400 dark:text-slate-500 mt-1">{book.author}</p>}
                      <div className="text-[10px] font-mono font-medium text-slate-400 dark:text-slate-500 mt-2 uppercase tracking-wider flex items-center gap-2">
                        {book.progress > 0 && book.words?.length > 0 ? (
                          <>
                            <span>{((book.progress / book.words.length) * 100).toFixed(0)}%</span>
                            <span>·</span>
                            <span>{Math.ceil((book.words.length - book.progress) / 500)} MIN LEFT</span>
                          </>
                        ) : (
                          <span>Unread</span>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              {books.length === 0 && !isParsing && (
                <div className="px-6 md:px-10 flex flex-col items-start text-slate-400 dark:text-slate-500 gap-4 max-w-md">
                  <div className="p-4 bg-slate-100 dark:bg-[#1e1e1e] rounded-2xl border border-slate-200 dark:border-slate-800 border-dashed">
                    <BookOpen size={32} className="text-slate-300 dark:text-slate-600" />
                  </div>
                  <p className="text-sm font-medium">No books in your library yet. Click the button below or drop an EPUB file to begin.</p>
                </div>
              )}

              {/* Floating Action Button for Import */}
              <input 
                type="file" 
                accept=".epub" 
                ref={fileInputRef} 
                onChange={handleFileUpload} 
                className="hidden" 
              />
              <button 
                onClick={() => fileInputRef.current?.click()}
                disabled={isParsing || !window.ePub}
                className="fixed bottom-6 right-6 md:bottom-10 md:right-10 bg-[#1c1917] dark:bg-white text-white dark:text-[#1c1917] w-14 h-14 md:w-auto md:h-auto md:px-6 md:py-4 rounded-full shadow-2xl hover:shadow-3xl hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3 z-50 disabled:opacity-50 disabled:hover:scale-100"
              >
                {isParsing ? (
                  <div className="w-5 h-5 border-2 border-current border-t-transparent rounded-full animate-spin" />
                ) : (
                  <Plus size={20} />
                )}
                <span className="hidden md:inline font-semibold text-sm tracking-wide">Import EPUB</span>
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
